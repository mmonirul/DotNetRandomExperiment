version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: local-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: car-management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgweb:
    image: sosedoff/pgweb:0.16.2
    container_name: local-pgweb
    depends_on:
      - postgres
    environment:
      - PGWEB_DATABASE_URL=postgres://postgres:localpassword@postgres:5432/car-management?sslmode=disable
    ports:
      - "8081:8081"

volumes:
  postgres_data: