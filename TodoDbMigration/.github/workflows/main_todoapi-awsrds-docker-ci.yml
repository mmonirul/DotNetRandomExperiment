# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - todoapi-awsrds

on:
  push:
    branches:
      - docker-ci
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
      - uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.AzureAppService_ContainerUsername_58e59c55a7194a2985b87f0bc6c0c3eb }}
          password: ${{ secrets.AzureAppService_ContainerPassword_2c3932e89fbd47cfbbc701d5c31516ca }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          push: true
          tags: index.docker.io/${{ secrets.AzureAppService_ContainerUsername_58e59c55a7194a2985b87f0bc6c0c3eb }}/todoapi-awsrds:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'todoapi-awsrds'
          slot-name: 'production'
          publish-profile: ${{ secrets.AzureAppService_PublishProfile_819a602e7b3d49e4aff1f7779e1e15e5 }}
          images: 'index.docker.io/${{ secrets.AzureAppService_ContainerUsername_58e59c55a7194a2985b87f0bc6c0c3eb }}/todoapi-awsrds:${{ github.sha }}'
