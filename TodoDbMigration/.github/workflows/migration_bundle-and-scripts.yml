name: Deploy Car Management API with EF Migrations

on:
  push:
    branches:
      - updated-main
      - updated-main-script-migration

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build the project
        run: dotnet build --configuration Release --no-restore -o ${{env.DOTNET_ROOT}}/myapp

      - name: Install SQL Tools
        run: |
          dotnet tool install --global dotnet-ef
          sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run Migration Script
        run: |
          # Set PostgreSQL password as environment variable
          export PGPASSWORD="${{ secrets.AWS_RDS_PASSWORD }}"
          
          # Run the migration script with explicit connection details
          psql "host=${{ secrets.AWS_RDS_HOST }} port=5432 user=${{ secrets.AWS_RDS_USERNAME }} dbname=${{ secrets.AWS_RDS_DATABASE }}" -f TodoWebApi/Migrations/Scripts/migrations.sql
        env:
          ASPNETCORE_ENVIRONMENT: Production

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'todo-api-migration'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_7E5611C10C4E4A08845D4822D0F07974 }}
          package: ${{env.DOTNET_ROOT}}/myapp
        env:
          ASPNETCORE_ENVIRONMENT: Production
          AWS__AccessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS__SecretAccessKey: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
