# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - todo-api-migration

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  migrate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'

    - name: Install dependencies
      run: dotnet restore

    - name: Install dotnet-ef tool
      run: dotnet tool install --global dotnet-ef

    - name: Build project
      run: dotnet build --no-restore

    - name: Generate EF migration script
      run: |
        dotnet ef migrations script --idempotent\
          --project TodoWebApi/TodoWebApi.csproj \
          --output migration.sql \
          --context AppDbContext

    - name: Apply migration
      run: |
        psql \
          --host=${{ secrets.AWS_RDS_HOST }} \
          --port=5432 \
          --username=${{ secrets.AWS_RDS_USERNAME }} \
          --dbname=${{ secrets.AWS_RDS_DATABASE }} \
          --file=migration.sql
      env:
        PGPASSWORD: ${{ secrets.AWS_RDS_PASSWORD }}

    - name: Verify migration success
      run: echo "Migration applied successfully."

    - name: Exit on failure
      if: failure()
      run: exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'todo-api-migration'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_7E5611C10C4E4A08845D4822D0F07974 }}